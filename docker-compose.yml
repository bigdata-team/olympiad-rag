services:
  postgres:
    image: pgvector/pgvector:pg17
    profiles: [ "prod", "dev" ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles: [ "prod", "dev" ]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: [ "prod" ]
    command: celery -A src.jobs worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      API_BASE: ${API_BASE}
      API_KEY: ${API_KEY}
      CHAT_API_BASE: ${CHAT_API_BASE}
      CHAT_API_KEY: ${CHAT_API_KEY}
      CHAT_MODEL: ${CHAT_MODEL}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EVAL_API_BASE: ${EVAL_API_BASE}
      EVAL_API_KEY: ${EVAL_API_KEY}
      EVAL_MODEL: ${EVAL_MODEL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}

  worker-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    profiles: [ "dev" ]
    command: celery -A src.jobs worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      API_BASE: ${API_BASE}
      API_KEY: ${API_KEY}
      CHAT_API_BASE: ${CHAT_API_BASE}
      CHAT_API_KEY: ${CHAT_API_KEY}
      CHAT_MODEL: ${CHAT_MODEL}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EVAL_API_BASE: ${EVAL_API_BASE}
      EVAL_API_KEY: ${EVAL_API_KEY}
      EVAL_MODEL: ${EVAL_MODEL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    volumes:
      - ./src:/app/src

  app:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: [ "prod" ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      API_BASE: ${API_BASE}
      API_KEY: ${API_KEY}
      CHAT_API_BASE: ${CHAT_API_BASE}
      CHAT_API_KEY: ${CHAT_API_KEY}
      CHAT_MODEL: ${CHAT_MODEL}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EVAL_API_BASE: ${EVAL_API_BASE}
      EVAL_API_KEY: ${EVAL_API_KEY}
      EVAL_MODEL: ${EVAL_MODEL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    ports:
      - "80:8000"

  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    profiles: [ "dev" ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      API_BASE: ${API_BASE}
      API_KEY: ${API_KEY}
      CHAT_API_BASE: ${CHAT_API_BASE}
      CHAT_API_KEY: ${CHAT_API_KEY}
      CHAT_MODEL: ${CHAT_MODEL}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EVAL_API_BASE: ${EVAL_API_BASE}
      EVAL_API_KEY: ${EVAL_API_KEY}
      EVAL_MODEL: ${EVAL_MODEL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src

volumes:
  postgres_data:
  redis_data:
